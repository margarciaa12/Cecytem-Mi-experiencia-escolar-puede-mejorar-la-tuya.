<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Ejemplo</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:white;
}

/* BARRA MENU */
nav{
    background:#87CEFA; /* azul claro */
    padding:10px 0;
}

/* LISTA MENU */
nav ul{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
}

/* ITEMS */
nav ul li{
    position:relative;
}

/* BOTONES */
nav ul li a{
    display:block;
    padding:15px 25px;
    color:#003366;
    text-decoration:none;
    font-weight:bold;
}

/* HOVER */
nav ul li a:hover{
    background:#5DADE2;
    color:white;
}

/* SUBMENU */
nav ul li ul{
    display:none;
    position:absolute;
    background:#AED6F1;
    top:100%;
    left:0;
    min-width:150px;
}

/* MOSTRAR SUBMENU */
nav ul li:hover ul{
    display:block;
}

nav ul li ul li a{
    padding:12px;
}

</style>
</head>

<body>

<nav>
<ul>

<li>
<a href="#">Menu 1</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 2</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 3</a>
<ul>

<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 4</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 5</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li>
<a href="#">Menu 6</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

</ul>
</nav>

</body>
</html>
