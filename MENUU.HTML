<!DOCTYPE html>
<html>
<head>
<title>Menu</title>

<style>
body{
margin:0;
font-family:Arial;
}

ul{
list-style:none;
margin:0;
padding:0;
background:#1e5ed6;
overflow:hidden;
}

ul li{
float:left;
position:relative;
}

ul li a{
display:block;
color:white;
padding:14px 20px;
text-decoration:none;
}

ul li:hover{
background:#0f3fa8;
}

/* Submenu */

ul li ul{
display:none;
position:absolute;
background:#1e5ed6;
top:48px;
}

ul li:hover ul{
display:block;
}

ul li ul li{
float:none;
width:150px;
}

</style>

</head>

<body>

<ul>
<li><a href="#">Menu 1</a>
<ul>
<li><a href="#">Submenu 1</a></li>
<li><a href="#">Submenu 2</a></li>
</ul>
</li>

<li><a href="#">Menu 2</a>
<ul>

<li><a href="#">Submenu 2</a></li>
</ul>
</li>

</ul>
</li>

</ul>

</body>
</html>
